name: SharePoint Sync & Deploy

on:
  repository_dispatch:
    types: [sharepoint-update]
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    
    - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Extract data from Excel
        run: |
          python scripts/extract-data.py
      
      - name: Update HTML
        run: |
          python scripts/update-html.py
      
      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add index.html
          git diff --staged --quiet || git commit -m "🔄 Auto-update from SharePoint ($(date '+%Y-%m-%d %H:%M'))"
      
      - name: Push changes
        run: |
          git push https://${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/stephenkwapis/nooks-dashboard.git main
